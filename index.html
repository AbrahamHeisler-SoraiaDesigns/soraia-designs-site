    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What does an STR interior designer do?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An STR interior designer creates spaces specifically optimized for short-term rental performance. Unlike traditional interior design, STR design focuses on guest psychology, revenue optimization, durable materials for high turnover, and photography-ready spaces that drive bookings."
          }
        },
        {
          "@type": "Question",
          "name": "How much does STR interior design cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Soraia Designs projects start at $5,000. Final investment depends on property size, scope of work, and whether you need full design, sourcing, procurement, or a combination. We provide detailed proposals after an initial strategy call."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with Airbnb and vacation rental properties?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Soraia Designs specializes exclusively in short-term rental properties including Airbnb, VRBO, and direct-booking vacation rentals. We design spaces that drive higher nightly rates, better reviews, and increased occupancy."
          }
        },
        {
          "@type": "Question",
          "name": "What areas do you serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We are based in Tampa, FL and serve the entire Tampa Bay area including St. Petersburg, Clearwater, Bradenton, and Sarasota. We also take on select projects throughout Florida and offer virtual design consultations nationwide."
          }
        }
      ]
    }
